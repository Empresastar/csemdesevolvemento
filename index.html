<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS-GO | Professional Engine v1.0</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@core/": "./src/core/",
                "@entities/": "./src/entities/",
                "@weapons/": "./src/weapons/",
                "@utils/": "./src/utils/",
                "@ui/": "./src/ui/"
            }
        }
    </script>
</head>
<body>

    <div id="loading-screen" class="overlay">
        <div class="loader-content">
            <h1 class="glitch">JS-GO 1.6</h1>
            <p id="loader-status">Iniciando Engine...</p>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="main-menu" class="overlay" style="display: none;">
        <div class="menu-box">
            <button class="menu-btn active" id="btn-start">ENTRAR NO SERVIDOR</button>
            <button class="menu-btn" id="btn-options">OPÇÕES</button>
            <button class="menu-btn" id="btn-exit">SAIR</button>
        </div>
    </div>

    <div id="game-hud" style="display: none;">
        <div class="hud-bottom">
            <div class="stat-box hp-box">
                <span class="label">+</span>
                <span id="hp-value">100</span>
            </div>
            
            <div class="stat-box ammo-box">
                <span id="ammo-mag">30</span>
                <span class="separator">/</span>
                <span id="ammo-res">90</span>
            </div>
        </div>
        
        <div id="crosshair">
            <div class="ch-part top"></div>
            <div class="ch-part bottom"></div>
            <div class="ch-part left"></div>
            <div class="ch-part right"></div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
    
</body>
</html>
